---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cat-default
  namespace: cat-env

---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cat-default
  namespace: cat-env
rules:
- apiGroups: [""]
  resources: ["pods","pods/exec","pods/log"]
  verbs: ["*"]

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cat-default
  namespace: cat-env
subjects:
- kind: ServiceAccount
  name: cat-default
  namespace: cat-env
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cat-default