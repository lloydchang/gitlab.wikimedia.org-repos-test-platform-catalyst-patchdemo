# syntax=docker-registry.wikimedia.org/repos/releng/blubber/buildkit:v0.20.0
version: v4
variants:
  patchdemo:
    lives:
      uid: 33
      gid: 33
      as: www-data
    base: docker-registry.wikimedia.org/patchdemo:latest
    builders:
      - custom:
          command: [cd /var/www/html && /var/www/html/setup-docker.sh]
          requirements:
            - from: local
              source: .
              destination: /var/www/html
    runs:
      uid: 33
      gid: 33
      as: www-data
      environment:
        HOME: /var/www/html/


